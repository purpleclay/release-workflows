name: scorecard
on:
  schedule:
    - cron: "30 4 * * 1" # weekly, Monday 04:30 UTC
  push:
    branches:
      - main
  branch_protection_rule:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: analysis
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read # let scorecard's checks read repo content (e.g. workflow files)
      security-events: write # upload the SARIF results to code scanning
      id-token: write # required by scorecard-action for publish_results
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.deps.dev:443
            api.github.com:443
            api.osv.dev:443
            api.scorecard.dev:443
            fulcio.sigstore.dev:443
            github.com:443
            oss-fuzz-build-logs.storage.googleapis.com:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
            www.bestpractices.dev:443

      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: scorecard_analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      # Required: publish_results only pushes to the public OSSF badge API.
      # Getting results into this repo's own Security tab needs a separate
      # SARIF upload to code scanning.
      - name: publish_results
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
