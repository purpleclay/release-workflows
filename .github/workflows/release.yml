name: release
on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    environment: release
    permissions:
      contents: write # create the GitHub release
    steps:
      - name: harden_runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: release_note
        id: notes
        uses: purpleclay/release-note-action@025752af8e9dd1c855a7f16343af289fbdcc8f5a # v0.1.0

      - name: publish_release
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          NOTES_FILE: ${{ steps.notes.outputs.release-note-path }}
        run: |
          set -euo pipefail
          # A prior run of this job may have been interrupted after creating
          # the release but before it finished, leaving a partial release
          # behind that would make every retry fail on "release already
          # exists". Delete it first so each run starts clean.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes
          fi

          url=$(gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$NOTES_FILE" \
            --verify-tag)
          echo "url=${url}" >> "$GITHUB_OUTPUT"
